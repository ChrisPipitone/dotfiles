#------------------------------------------------------------------------------#
#                                  Window Rules                                #
#------------------------------------------------------------------------------#
windowrule = opacity 1.0, ^(Brave)$
windowrule = opacity 1.0 override,^(Brave-browser)$
windowrule = opacity 1.0 override,^(Postman)$
windowrule = opacity 1.0 override,^(obsidian)$
windowrule = opacity 1.0 override,^(firefox)$
windowrule = opacity 1.0 override,^(teams-for-linux)$
windowrule = opacity 1.0 override,^(outlook-for-linux)$

# XWayland https://wiki.hyprland.org/Useful-Utilities/Screen-Sharing/
windowrulev2 = opacity 0.0 override 0.0 override,class:^(xwaylandvideobridge)$
windowrulev2 = noanim,class:^(xwaylandvideobridge)$
windowrulev2 = noinitialfocus,class:^(xwaylandvideobridge)$
windowrulev2 = maxsize 1 1,class:^(xwaylandvideobridge)$
windowrulev2 = noblur,class:^(xwaylandvideobridge)$
