set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"
set-option -g default-shell $SHELL

set -g prefix C-b

unbind %
bind | split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# Re-sync theme from omarchy (run after changing OS theme)
bind T run-shell "~/.config/tmux/apply-theme.sh && tmux source ~/.config/tmux/current-theme.conf" \; display "Theme reloaded"

set -g mouse on
set -g history-limit 50000
set -g base-index 0
set -g pane-base-index 0
set -g renumber-windows on

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

set -sg escape-time 0
set -g focus-events on
set -g status-position top
set -g status-justify centre
set -g status-left-length 50
set -g status-right-length 50
set -g status-interval 60

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Generate and apply theme from omarchy colors.toml (or catppuccin mocha fallback)
run-shell "~/.config/tmux/apply-theme.sh"
source-file ~/.config/tmux/current-theme.conf

run '~/.tmux/plugins/tpm/tpm'
